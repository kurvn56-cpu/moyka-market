<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомойка SIM MARKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        .field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 14px; width: 100%; color: white; outline: none; }
        .gold { background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-black">

    <header class="text-center mb-10">
        <h1 class="text-5xl font-black tracking-tighter gold">АВТОМОЙКА</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em] mt-2">Бабаюртовское шоссе, 26</p>
    </header>

    <div class="max-w-md w-full glass p-10 shadow-2xl">
        <form id="washForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">Категория авто</label>
                <select id="carCategory" class="field" onchange="document.getElementById('finalPrice').innerText = this.value + ' ₽'">
                    <option value="1200">Советская (1200 ₽)</option>
                    <option value="1400">Иномарка (1400 ₽)</option>
                    <option value="1500">Джип (1500 ₽)</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">Марка и модель</label>
                <input type="text" id="carModel" class="field" placeholder="Напр: Приора или Toyota Camry" required>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">Состояние</label>
                <select id="dirtLevel" class="field">
                    <option value="Грязный">Грязный</option>
                    <option value="Сильно грязный">Сильно грязный</option>
                    <option value="Слабо грязный">Слабо грязный</option>
                    <option value="Пыльный">Пыльный</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-3">Услуга</label>
                <select id="service" class="field">
                    <option value="Полная">Полная мойка</option>
                    <option value="Верх">Только верх</option>
                    <option value="Салон">Только салон</option>
                </select>
            </div>

            <div class="pt-6 border-t border-white/5 flex justify-between items-end">
                <span class="text-zinc-500 text-sm">К оплате:</span>
                <span id="finalPrice" class="text-3xl font-black text-white">1200 ₽</span>
            </div>

            <button type="submit" class="w-full py-5 bg-white text-black rounded-2xl font-black uppercase tracking-tighter hover:bg-zinc-200 transition active:scale-95">
                Записаться
            </button>
        </form>
    </div>

    <script>
        const BOT_TOKEN = '8666944440:AAFAmQuYaYmnJjhuQ9AmdBQim9V-kxNnxAo';
        const ADMIN_ID = '8768514374';

        document.getElementById('washForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const category = document.getElementById('carCategory').options[document.getElementById('carCategory').selectedIndex].text;
            const model = document.getElementById('carModel').value;
            const dirt = document.getElementById('dirtLevel').value;
            const service = document.getElementById('service').value;
            const price = document.getElementById('finalPrice').innerText;

            const msg = `🧽 **НОВАЯ ЗАЯВКА**\n\n` +
                        `🚗 **Авто:** ${model} (${category})\n` +
                        `🌫 **Состояние:** ${dirt}\n` +
                        `✨ **Услуга:** ${service}\n` +
                        `💰 **Итог:** ${price}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

            try {
                await fetch(url);
                alert('✅ Заявка отправлена!');
                location.reload();
            } catch (err) {
                alert('❌ Ошибка сети.');
            }
        };
    </script>
</body>
</html>
