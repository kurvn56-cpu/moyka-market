<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM MARKET | Premium Wash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;900&display=swap');
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }
        
        .blob {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(191, 149, 63, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-premium {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-premium:focus {
            border-color: #bf953f;
            box-shadow: 0 0 20px rgba(191, 149, 63, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        .btn-gold {
            background: linear-gradient(135deg, #bf953f 0%, #b38728 100%);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(191, 149, 63, 0.4);
        }
        
        .label-text {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-10 px-4">
    <div class="bg-animate">
        <div class="blob"></div>
    </div>

    <div class="text-center mb-12">
        <h1 style="font-family: 'Syncopate', sans-serif;" class="text-4xl md:text-6xl font-bold tracking-tighter gold-gradient">SIM MARKET</h1>
        <div class="h-1 w-24 bg-gradient-to-r from-transparent via-[#bf953f] to-transparent mx-auto mt-4"></div>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.5em] mt-4">Хасавюрт • Бабаюртовское шоссе, 26</p>
    </div>

    <div class="max-w-xl w-full glass-card p-8 md:p-12 relative overflow-hidden">
        <form id="washForm" class="space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="label-text">🚗 Класс авто</label>
                    <select id="carClass" class="input-premium">
                        <option value="Советская (1200 ₽)">Советская (1200 ₽)</option>
                        <option value="Иномарка (1400 ₽)">Иномарка (1400 ₽)</option>
                        <option value="Джип (1500 ₽)">Джип (1500 ₽)</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">🏷 Марка и модель</label>
                    <input type="text" id="carModel" class="input-premium" placeholder="Напр: Лада Приора" required>
                </div>
            </div>

            <div>
                <label class="label-text">📞 Контактный номер</label>
                <input type="tel" id="clientPhone" class="input-premium" placeholder="+7 (___) ___-__-__" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="label-text">✨ Основная услуга</label>
                    <select id="service" class="input-premium">
                        <option value="Полная">Полная мойка</option>
                        <option value="Верх">Только верх</option>
                        <option value="Салон">Только салон</option>
                    </select>
                </div>
                <div>
                    <label class="label-text">🧼 Химчистка</label>
                    <select id="chemClean" class="input-premium">
                        <option value="Нет">Без химчистки</option>
                        <option value="Ковролин">Ковролин</option>
                        <option value="Потолок">Потолок</option>
                        <option value="Багажник">Багажник</option>
                        <option value="Сиденья">Сиденья</option>
                        <option value="Комплекс">Полный комплекс</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="label-text">🌫 Уровень загрязнения</label>
                <div class="grid grid-cols-2 gap-3">
                    <select id="dirtLevel" class="input-premium col-span-2">
                        <option value="Пыльный">Пыльный</option>
                        <option value="Слабо грязный">Слабо грязный</option>
                        <option value="Грязный">Грязный</option>
                        <option value="Очень грязный">Очень грязный</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-gold w-full py-5 rounded-2xl text-lg shadow-xl active:scale-95">
                Записаться на мойку
            </button>
        </form>
    </div>

    <div class="mt-10
