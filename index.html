<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIM MARKET</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');

body{
background:#050505;
color:white;
font-family:Manrope;
}

.header{
background:rgba(10,10,10,0.8);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

.gold{
background:linear-gradient(135deg,#fbbf24,#d97706);
}

.gold-text{
background:linear-gradient(135deg,#fbbf24,#d97706);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:#0b0b0b;
border:1px solid rgba(255,255,255,0.05);
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.badge{
font-size:10px;
padding:2px 6px;
border-radius:6px;
background:#111;
color:#aaa;
}

.vip{
background:#1c1917;
color:#fbbf24;
}

.favorite{
cursor:pointer;
}

</style>
</head>

<body>

<header class="header sticky top-0 z-50 p-5 flex justify-between items-center">

<h1 class="text-xl font-black">
SIM <span class="gold-text">MARKET</span>
</h1>

<div class="text-xs opacity-40 uppercase">
Premium Numbers
</div>

</header>


<main class="max-w-5xl mx-auto p-4">

<!-- SEARCH -->

<div class="flex gap-3 mb-4">

<input
id="search"
oninput="render()"
placeholder="Поиск номера..."
class="flex-1 p-4 rounded-xl bg-zinc-900 border border-zinc-800"
/>

<select id="sort" onchange="render()" class="p-4 rounded-xl bg-zinc-900 border border-zinc-800">

<option value="default">Сортировка</option>
<option value="cheap">Сначала дешевые</option>
<option value="expensive">Сначала дорогие</option>

</select>

</div>


<!-- FILTER -->

<div class="flex gap-2 mb-6 flex-wrap">

<button onclick="setFilter('all')" class="badge">Все</button>
<button onclick="setFilter('mts')" class="badge">МТС</button>
<button onclick="setFilter('megafon')" class="badge">Мегафон</button>
<button onclick="setFilter('beeline')" class="badge">Билайн</button>
<button onclick="setFilter('tele2')" class="badge">Tele2</button>

</div>


<!-- LIST -->

<div id="grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

</main>



<!-- ORDER MODAL -->

<div id="modal" class="fixed inset-0 hidden bg-black/90 flex items-center justify-center p-4">

<div class="bg-zinc-950 p-8 rounded-3xl w-full max-w-sm space-y-4">

<h2 id="mNumber" class="text-2xl font-black text-center"></h2>

<input id="fio" placeholder="ФИО" class="w-full p-3 rounded-lg bg-zinc-900 border border-zinc-800">

<input id="phone" placeholder="Телефон" class="w-full p-3 rounded-lg bg-zinc-900 border border-zinc-800">

<button onclick="order()" class="gold w-full p-3 rounded-lg text-black font-bold">
Купить номер
</button>

<button onclick="closeModal()" class="w-full text-xs opacity-40">
Закрыть
</button>

</div>

</div>



<script>

let db=[

{n:"9999999999",op:"mts",price:25000,type:"platinum"},
{n:"7777777777",op:"megafon",price:18000,type:"vip"},
{n:"9000000000",op:"beeline",price:12000,type:"gold"},
{n:"5555555555",op:"tele2",price:8000,type:"vip"},
{n:"1234567890",op:"mts",price:3000,type:"normal"}

]

let filter="all"
let selected=null

function setFilter(f){

filter=f
render()

}

function render(){

let q=document.getElementById("search").value
let sort=document.getElementById("sort").value

let data=db.filter(i=>{

return i.n.includes(q)&&(filter==="all"||i.op===filter)

})

if(sort==="cheap") data.sort((a,b)=>a.price-b.price)
if(sort==="expensive") data.sort((a,b)=>b.price-a.price)

let grid=document.getElementById("grid")

grid.innerHTML=data.map(i=>`

<div class="card p-4 rounded-2xl space-y-3">

<div class="flex justify-between">

<div class="badge">${i.op}</div>

<div class="favorite" onclick="fav(this)">🤍</div>

</div>

<div class="text-lg font-black">${i.n}</div>

<div class="flex justify-between items-center">

<div class="text-amber-400 font-bold">
${i.price} ₽
</div>

<button onclick="openModal('${i.n}')"
class="gold text-black px-3 py-1 rounded-lg text-sm">

Купить

</button>

</div>

</div>

`).join("")

}

function fav(el){

el.innerText = el.innerText==="🤍" ? "❤️" : "🤍"

}

function openModal(n){

selected=n

document.getElementById("mNumber").innerText=n
document.getElementById("modal").classList.remove("hidden")

}

function closeModal(){

document.getElementById("modal").classList.add("hidden")

}

function order(){

let fio=document.getElementById("fio").value
let phone=document.getElementById("phone").value

if(!fio||!phone){

alert("Заполните данные")

return

}

alert("Заявка отправлена!")

closeModal()

}

render()

</script>

</body>
</html>
