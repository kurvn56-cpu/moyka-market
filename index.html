<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомойка SIM MARKET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .gold { background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <h1 class="text-4xl font-black mb-8 gold">АВТОМОЙКА</h1>
    <div class="max-w-md w-full glass p-8 shadow-2xl">
        <form id="washForm" class="space-y-5">
            <select id="car" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 text-white outline-none" onchange="document.getElementById('price').innerText = this.value + ' ₽'">
                <option value="1200">Советская (1200 ₽)</option>
                <option value="1400">Иномарка (1400 ₽)</option>
                <option value="1500">Джип (1500 ₽)</option>
            </select>
            <select id="service" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 text-white outline-none">
                <option value="Полная">Полная мойка</option>
                <option value="Верх">Только верх</option>
                <option value="Салон">Только салон</option>
            </select>
            <input type="text" id="data" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 text-white outline-none" placeholder="Госномер авто" required>
            <div class="text-right text-2xl font-bold" id="price">1200 ₽</div>
            <button type="submit" class="w-full py-4 bg-white text-black rounded-xl font-bold uppercase active:scale-95 transition">Записаться</button>
        </form>
    </div>
    <script>
        document.getElementById('washForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = `🧽 ЗАЯВКА: МОЙКА\n🚗 Авто: ${document.getElementById('car').options[document.getElementById('car').selectedIndex].text}\n✨ Тип: ${document.getElementById('service').value}\n📱 Клиент: ${document.getElementById('data').value}\n💰 Цена: ${document.getElementById('price').innerText}`;
            const url = `https://api.telegram.org/bot8666944440:AAFAmQuYaYmnJjhuQ9AmdBQim9V-kxNnxAo/sendMessage?chat_id=8768514374&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
            await fetch(url);
            alert('Заявка отправлена!');
            location.reload();
        };
    </script>
</body>
</html>
