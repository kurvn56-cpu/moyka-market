<script>
    const BOT_TOKEN = '8666944440:AAFAmQuYaYmnJjhuQ9AmdBQim9V-kxNnxAo';
    const ADMIN_ID = '8768514374';

    document.getElementById('washForm').onsubmit = function(e) {
        e.preventDefault();
        
        const model = document.getElementById('carModel').value;
        const phone = document.getElementById('clientPhone').value;
        const category = document.getElementById('carCategory').options[document.getElementById('carCategory').selectedIndex].text;
        const service = document.getElementById('service').value;
        const price = document.getElementById('finalPrice').innerText;
        const time = document.getElementById('visitTime').value;

        const msg = `🧽 ЗАПИСЬ НА МОЙКУ\n\n📞 Тел: ${phone}\n🚗 Авто: ${model} (${category})\n✨ Услуга: ${service}\n📅 Время: ${time}\n💰 Итог: ${price}`;

        // Используем более надежный метод отправки
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const params = {
            chat_id: ADMIN_ID,
            text: msg,
            parse_mode: 'HTML'
        };

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(params)
        })
        .then(response => {
            if (response.ok) {
                alert('✅ Заявка отправлена!');
                location.reload();
            } else {
                alert('❌ Ошибка бота. Проверьте, нажали ли вы START в боте.');
            }
        })
        .catch(err => alert('❌ Ошибка сети: ' + err));
    };
</script>
