<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM MARKET | Автомойка & Детейлинг</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        .field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 14px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .field:focus { border-color: #bf953f; }
        .gold { background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        label { display: block; text-transform: uppercase; font-size: 10px; font-weight: 700; color: #52525b; letter-spacing: 0.2em; margin-bottom: 8px; margin-left: 4px; }
    </style>
</head>
<body class="min-h-screen py-10 px-4 bg-black flex flex-col items-center">

    <header class="text-center mb-8">
        <h1 class="text-5xl font-black tracking-tighter gold">SIM MARKET</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em] mt-2">Бабаюртовское шоссе, 26 • Хасавюрт</p>
    </header>

    <div class="max-w-md w-full glass p-10 shadow-2xl">
        <form id="washForm" class="space-y-6">
            
            <div>
                <label>Класс автомобиля</label>
                <select id="carCategory" class="field">
                    <option value="Советская (1200 ₽)">Советская (1200 ₽)</option>
                    <option value="Иномарка (1400 ₽)">Иномарка (1400 ₽)</option>
                    <option value="Джип (1500 ₽)">Джип (1500 ₽)</option>
                </select>
            </div>

            <div>
                <label>Марка и модель</label>
                <input type="text" id="carModel" class="field" placeholder="Напр: Приора" required>
            </div>

            <div>
                <label>Ваш номер телефона</label>
                <input type="tel" id="clientPhone" class="field" placeholder="+7 (___) ___-__-__" required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label>Услуга</label>
                    <select id="service" class="field">
                        <option value="Полная">Полная</option>
                        <option value="Верх">Верх</option>
                        <option value="Салон">Салон</option>
                    </select>
                </div>
                <div>
                    <label>Химчистка</label>
                    <select id="chemClean" class="field">
                        <option value="Нет">Нет</option>
                        <option value="Ковролин">Ковролин</option>
                        <option value="Потолок">Потолок</option>
                        <option value="Багажник">Багажник</option>
                        <option value="Сиденья">Сиденья</option>
                        <option value="Комплекс">Комплекс</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Степень загрязнения</label>
                <select id="dirtLevel" class="field">
                    <option value="Пыльный">Пыльный</option>
                    <option value="Слабо грязный">Слабо грязный</option>
                    <option value="Грязный">Грязный</option>
                    <option value="Сильно грязный">Сильно грязный</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full py-5 bg-white text-black rounded-2xl font-black uppercase tracking-tighter hover:bg-zinc-200 transition active:scale-95">
                Записаться на мойку
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-white/5">
            <a href="https://wa.me/79285555555" class="flex items-center justify-center gap-2 text-zinc-500 text-xs hover:text-green-500 transition">
                <span>Написать в WhatsApp</span>
            </a>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8666944440:AAFAmQuYaYmnJjhuQ9AmdBQim9V-kxNnxAo'; // Твой токен
        const TG_ID = '8768514374'; // Твой ID

        document.getElementById('washForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "ОТПРАВКА...";
            btn.disabled = true;

            const msg = `🧽 **НОВАЯ ЗАЯВКА: МОЙКА**\n\n` +
                        `📞 **Тел:** ${document.getElementById('clientPhone').value}\n` +
                        `🚗 **Авто:** ${document.getElementById('carModel').value} (${document.getElementById('carCategory').value})\n` +
                        `🧼 **Услуга:** ${document.getElementById('service').value}\n` +
                        `✨ **Химчистка:** ${document.getElementById('chemClean').value}\n` +
                        `🌫 **Состояние:** ${document.getElementById('dirtLevel').value}`;

            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_ID, text: msg, parse_mode: 'Markdown' })
                });
                alert('✅ Заявка принята!');
                location.reload();
            } catch (err) {
                alert('Ошибка отправки!');
                btn.disabled = false;
                btn.innerText = "Записаться на мойку";
            }
        };
    </script>
</body>
</html>
